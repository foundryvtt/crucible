      <p>A small, vibrant blue pearl that feels refreshingly cool to the touch
      regardless of ambient temperature. </p><h3 class="divider">Under
      Development</h3><p>While <strong>Invested</strong>, a Focusing Pearl
      permits its user to take the Refocus action without cost once per
      combat.</p><p>The magical effects of this item are not yet automated.
      These effects will be added when the Crucible enchanting affix system is
      added.</p>
    private: ''
