  description:
    public: >-
      <p>This carefully faceted gemstone glows faintly with warm light, and
      feels warm to the touch.</p><p></p><h3 class="divider">Under
      Development</h3><p>While <strong>Invested</strong>, this gem can be
      activated using a command word to cause it to glow, serving as a light
      source that sheds 20 feet of bright light and an additional 20 feet of dim
      light.</p><p>It also grants the user the ability to cast a special
      @Spell[illumination.ray] at a target they can see, causing injury and
      temporary blindness.</p><p>The magical effects of this item are not yet
      automated. These effects will be added when the Crucible enchanting affix
      system is added.</p><p></p>
