    public: >-
      <p>A sealed glass tube filled with a yellow liquid explodes when it breaks
      open, creating a sudden electrical discharge.</p>
    private: >-
      <p></p><p>Primarily used to power small electromechanical machines for
      short periods of time, these alchemical containers are somewhat unstable
      and react poorly when their contents are exposed to air, making them
      useful if unpredictable improvised explosives. If combined in a large
      enough quantity in the correct way, they can also be used to power more
      significant devices and discharge even more electrical energy.</p>
