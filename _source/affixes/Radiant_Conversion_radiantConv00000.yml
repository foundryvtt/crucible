description: >-
  <p>A portion of the damage dealt by strikes with this weapon is converted
  to <strong>Radiant</strong> damage. The proportion converted depends on
  the <strong>Tier</strong> of this
  prefix.</p><ul><li><p><strong>Tier 1:</strong> 33% of damage
  converted</p></li><li><p><strong>Tier 2:</strong> 66% of damage
  converted</p></li><li><p><strong>Tier 3:</strong> 100% of damage
  converted</p></li></ul><h3 class="divider">Playtest Notes</h3><p>The
  infrastructure for splitting a single attack into multiple typed damage
  components does not yet exist. Until it does, all tiers of this affix
  convert 100% of the weapon's damage to <strong>Radiant</strong>. Once
  multi-type damage is supported, lower tiers will convert only a fraction
  of the total damage, leaving the remainder as the weapon's original
  type.</p>
