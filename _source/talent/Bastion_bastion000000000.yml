name: Bastion
type: talent
img: icons/skills/melee/shield-block-fire-orange.webp
system:
  description: >-
    <p>You have mastered the art of the defensive stand, becoming an unbreakable
    wall. While you have the @Condition[guarded] condition, you have the
    following benefits:</p><ul><li><p>You cannot be moved against your will or
    rendered @Condition[prone].</p></li><li><p>Your space cannot be crossed by
    enemies, even when using abilities that would normally move through a
    creature.</p></li><li><p>Your <strong>Engagement</strong> increases by +1,
    holding more foes at bay.</p></li><li><p>Your <strong>Reflex</strong>
    defense is treated as the sum of your <strong>Armor</strong> and
    <strong>Block </strong>defenses, if greater, as you endure attacks rather
    than avoiding them.</p></li></ul>
  actions:
    - id: getBehindMe
      name: Get Behind Me
      condition: ''
      description: >-
        <p>Choose an ally adjacent to you and reposition them to be directly
        behind you, based on your direction of facing at the time this action is
        used, interposing yourself between that ally and their
        attackers.</p><p>This movement does not provoke reactions for
        Disengagement and the protected ally gains the @Condition[guarded]
        condition until the start of their next turn.</p>
