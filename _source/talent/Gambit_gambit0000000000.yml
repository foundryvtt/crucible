name: Gambit
type: talent
_id: gambit0000000000
img: icons/sundries/gaming/dice-pair-white-green.webp
system:
  description: >-
    <p>Some fight by the book, you fight by the odds. Every exchange is a wager:
    you read your opponent's intent, make risky bets to goad them into
    overcommitting, then stake everything on a game-changing payout. You trust
    your gut, wits, and some arcane chicanery to tilt the odds in your favor,
    gaining the following benefits:</p><ul><li><p><em>The Tell.</em> You see a
    blow before it is thrown. Your <strong>Dodge</strong> defense is calculated
    using your <strong>Intellect</strong> instead of <strong>Dexterity</strong>,
    if your <strong>Intellect</strong> is higher.</p></li><li><p><em>Loaded
    Dice.</em> Fortune bends to those who help it along. Once per round, the
    first time you roll a 1 on any die, that die is rerolled and you keep the
    new result.</p></li><li><p><em>Ante Up.</em> When you make a @Action[default
    strike], you can choose to wager additional <strong>Banes</strong> against
    yourself. If the <strong>Strike</strong> hits an enemy, you gain
    <strong>Gambit</strong> charges equal to the number of
    <strong>Banes</strong> you wagered. These charges accumulate until the end
    of <strong>Combat</strong> or until spent.</p></li></ul>
  actions:
    - id: gambitAllIn
      name: All-In
      img: icons/sundries/gaming/dice-pair-white-green.webp
      condition: ''
      description: >-
        <p>Every gamble you have made comes due, and you collect all at once.
        The next attack or check you make this turn rolls the maximum possible
        result on every die in its pool. If that action makes more than one
        roll, only the first is maximized. You can activate this action by
        spending either 6 <strong>Gambit</strong> charges or 1
        <strong>Heroism</strong>.</p>
