    <p>You are an expert in combat against magic users, trained to conserve your
    energy and strike at the precise moment to thwart an incantation.</p><p>Your
    @Action[default reactiveStrike] costs 2 less Action but always costs
    <strong>1 Focus</strong>. When you Strike an enemy in reaction to them
    casting a spell, a successful hit drains <strong>1 Focus</strong> from that
    enemy and refunds your own; on a <strong>Critical Hit</strong> their spell is
    interrupted and the magic is lost.</p>
