name: Warden
type: talent
img: icons/magic/nature/barrier-shield-wood-vines.webp
system:
  description: >-
    <p>You are a keeper of the old ways, a battle-druid who calls the spirits of
    your ancestors to shelter those under your protection.</p><p>You use
    @Action[Compendium.crucible.talent.Item.warden0000000000 ancestralGrove] to
    call forth an area of natural protection originating from the spiritual
    projection of an Ancestral Guardian.</p><h3
    class="divider">Playtesting</h3><p>The passive Resistance aura radiated by
    the Ancestral Guardian is not yet fully automated, pending further Aura and
    Region improvements.</p>
  actions:
    - id: ancestralGrove
      name: Ancestral Grove
      img: icons/magic/nature/tree-spirit-green.webp
      condition: ''
      description: >-
        <p>You call forth an
        @UUID[Compendium.crucible.summons.Actor.ancestralGuard00]{Ancestral
        Guardian} which manifests at a point you can see within 30 feet. The
        Guardian is an incorporeal spirit that cannot be harmed or moved.
        Creatures can pass through its space, but it counts as three creatures
        for the purposes of determining whether an enemy is
        @Condition[flanked].</p><p>The Guardian emanates an aura with a 20 foot
        radius that increases the <strong>Resistance</strong> of allies to all
        damage types by +2.</p><p>So long as the Guardian endures, your weapon
        attacks against enemies within this aura cause a transfer of life-force
        from your enemies to your allies. Your target suffers additional
        <strong>Poison</strong> damage equal to half your
        <strong>Wisdom</strong>, which is transferred as <strong>Health</strong>
        restoration to yourself or an ally within the grove who currently has
        the lowest Health.</p><p>The Guardian remains until Combat ends, or
        until the Warden uses this Action again.</p><p></p>
