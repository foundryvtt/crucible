name: 'Gesture: Create'
type: talent
img: icons/magic/nature/plant-sproud-hands-dirt-green.webp
system:
  description: >-
    <p>You coalesce arcane power into tangible form, manifesting a
    <strong>Sprite</strong> which appears within 10 feet and joins
    <strong>Combat</strong> at <strong>Initiative</strong> 1. Your Sprite is a
    <strong>Minion</strong> of half your own <strong>Level</strong>.</p><p>The
    <strong>Create</strong> gesture scales with <strong>Wisdom</strong> and the
    <strong>Sprite</strong> survives for <strong>6 Rounds</strong>. You may only
    have one active <strong>Sprite</strong>, casting another spell using the
    <strong>Create</strong> gesture replaces your previous
    <strong>Sprite</strong>. This gesture requires <strong>2 Hands</strong> to
    cast and has a base cost of <strong>4 Action</strong> and <strong>1
    Focus</strong>.</p><h3 class="divider">Playtest Notes</h3><p>Not all
    <strong>Runes</strong> have a Sprite actor defined yet.
    <strong>Runes</strong> that do not yet have a defined
    <strong>Creation</strong> will — for now — manifest
    a@UUID[Compendium.crucible.summons.Actor.RuNh1bFGiHKdHeKI].</p>
