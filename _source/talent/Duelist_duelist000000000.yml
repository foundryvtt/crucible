name: Duelist
type: talent
img: icons/skills/melee/sword-twirl-orange.webp
system:
  description: >-
    <p>You are a master of single combat, dueling with a one-handed weapon and a
    free off-hand. While wielding a one-handed melee weapon with your other hand
    empty, you gain a <strong>+2</strong> bonus to your <strong>Parry</strong>
    defense as long as you are not @Condition[flanked]. Your trained guard also
    turns more of the attacks you avoid into parries rather than glancing
    blows.</p>
  actions:
    - id: estocade
      name: Estocade
      img: icons/skills/melee/sword-twirl-orange.webp
      condition: ''
      description: >-
        <p>You deliver a precise, decisive thrust against a foe you have caught
        at a disadvantage. You make a <strong>Strike</strong> with your
        main-hand weapon which is <strong>Empowered</strong> and
        <strong>Keen</strong>.</p><p>You may only perform this attack against a
        target who is @Condition[exposed], @Condition[prone],
        @Condition[slowed], @Condition[staggered], @Condition[paralyzed] or who
        has been disarmed of their main-hand weapon.</p>
      tags:
        - melee
        - mainhand
        - empowered
        - keen
