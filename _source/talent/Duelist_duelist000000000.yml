name: Duelist
type: talent
img: icons/skills/melee/sword-twirl-orange.webp
system:
  description: >-
    <p>You relish the thrill and skillful mastery of single combat, employing a
    fighting style that uses a one-handed weapon while keeping your off-hand
    unoccupied.</p><p>While wielding a one-handed melee weapon with your other
    hand empty, you gain a <strong>+2</strong> bonus to your
    <strong>Parry</strong> defense as long as you are not @Condition[flanked].
    While meeting these criteria, any attack that results in a
    <strong>Glance</strong> against your <strong>Armor</strong> becomes a
    <strong>Parry</strong> instead.</p>
  actions:
    - id: estocade
      name: Estocade
      img: icons/skills/melee/sword-twirl-orange.webp
      condition: ''
      description: >-
        <p>You deliver a precise, decisive thrust against a foe you have caught
        at a disadvantage. You make a <strong>Strike</strong> with your
        main-hand weapon which is <strong>Empowered</strong> and
        <strong>Keen</strong>.</p><p>You may only perform this attack against a
        target who is @Condition[exposed], @Condition[prone],
        @Condition[slowed], @Condition[staggered], @Condition[paralyzed] or who
        has been disarmed of their main-hand weapon.</p>
      tags:
        - melee
        - mainhand
        - empowered
        - keen
