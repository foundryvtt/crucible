name: Telekinetic
type: talent
img: icons/magic/earth/projectiles-stone-salvo.webp
system:
  description: >-
    <p>You wield kinetic force with practiced ease, bending the paths of objects
    and creatures to your will.</p><ul><li><p>Once per turn, when you apply
    @UUID[Compendium.crucible.talent.Item.inflectionpush00]{Inflection: Push} or
    @UUID[Compendium.crucible.talent.Item.inflectionpull00]{Inflection: Pull}
    toH a Spell, you ignore the inflection's <strong>Focus</strong>
    cost.</p></li><li><p>You double the distance at which you can Pull, Flick,
    or Suspend using the
    @Action[Compendium.crucible.talent.Item.runeKinesis00000 propel]
    action.</p></li><li><p>You unlock the <strong>Telekinetic Flight</strong>
    action, suspending yourself aloft to fly and hover.</p></li></ul>
