name: Telekinetic
type: talent
img: icons/magic/movement/pinwheel-turning-blue.webp
system:
  description: >-
    <p>You wield kinetic force with practiced ease, bending the paths of objects
    and creatures to your will.</p><ul><li><p>Once per turn, when you apply the
    <strong>Push</strong> or <strong>Pull</strong> inflection to a Spell which
    uses the <strong>Kinesis</strong> rune, you ignore the inflection's
    <strong>Focus</strong> cost.</p></li><li><p>You double the distance at which
    you can Pull, Flick, or Suspend using the <strong>Propel</strong> action of
    the Kinesis rune.</p></li><li><p>You unlock the <strong>Telekinetic
    Flight</strong> action, suspending yourself aloft to fly and hover.</p></li></ul>
  actions:
    - id: telekineticFlight
      name: Telekinetic Flight
      img: icons/magic/control/debuff-energy-hold-levitate-blue-yellow.webp
