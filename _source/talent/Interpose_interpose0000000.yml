system:
  description: >-
    <p>You are willing to throw yourself into harm's way to protect your allies,
    subjecting yourself to danger in their stead.</p>
  actions:
    - id: interpose
      name: Interpose
      img: icons/skills/wounds/injury-pain-body-orange.webp
      description: >-
        <p>As a <strong>Reaction</strong> when an adjacent ally is hit or
        glanced by a single-target attack that targeted their <strong>Physical
        Defense</strong>, you may Interpose to become the target of that attack
        instead.</p><p>The attack is negated and the attack is re-evaluated
        against your own <strong>Physical Defense</strong> using the same dice
        rolls from the original attack. The consequences of the attack are
        resolved according to this new result with you as its target.</p>
