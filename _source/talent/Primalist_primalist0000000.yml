system:
  description: >-
    <p>The potency of elemental <strong>Runes</strong> flows through you. By
    adopting an elemental <strong>Stance</strong> you channel a
    <strong>Rune</strong> through your weapon <strong>Strikes</strong>. You may
    enter a Stance for one of the elemental Runes that you
    know:</p><ul><li><p>@UUID[Compendium.crucible.talent.Item.runeEarth0000000]{Rune:
    Earth}</p></li><li><p>@UUID[Compendium.crucible.talent.Item.runeFlame0000000]{Rune:
    Flame}</p></li><li><p>@UUID[Compendium.crucible.talent.Item.runeFrost0000000]{Rune:
    Frost}</p></li><li><p>@UUID[Compendium.crucible.talent.Item.runeStorm0000000]{Rune:
    Storm}</p></li></ul><p>You may enter or change your Stance once per
    <strong>Turn</strong>, and your entered stance lasts until you change it or
    until <strong>Combat</strong> ends. While in a <strong>Stance</strong>,
    talents or features which apply <strong>Critical Hit</strong> effects for
    actions that use that Rune apply to your weapon <strong>Strikes</strong> as
    well.</p>
