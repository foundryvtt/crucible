system:
  description: >-
    <p>The potency of elemental Runes flows through you. By adopting an
    elemental <strong>Stance</strong> you channel a Rune through your weapon
    Strikes. You may enter a Stance for one of the elemental Runes that you
    know:
    </p><ul><li><p>@UUID[Compendium.crucible.talent.Item.runeEarth0000000]{Rune:
    Earth}</p></li><li><p>@UUID[Compendium.crucible.talent.Item.runeFlame0000000]{Rune:
    Flame}</p></li><li><p>@UUID[Compendium.crucible.talent.Item.runeFrost0000000]{Rune:
    Frost}</p></li><li><p>@UUID[Compendium.crucible.talent.Item.runeLightning000]{Rune:
    Lightning}</p></li></ul><p>You may enter or change your Stance once per
    <strong>Turn</strong>, and your entered stance lasts until you change it or
    until  Combat ends. While in a Stance, talents or features which apply
    Critical Hit effects for actions that use that Rune apply to your weapon
    Strikes as well.</p>
