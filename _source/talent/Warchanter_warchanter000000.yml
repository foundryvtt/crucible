system:
  description: >-
    <p>You are a battle-singer who turns the clamor of war into power, your
    chants carried on the rhythm of your own blows. You know six
    <strong>Chants</strong>; three <strong>Songs</strong> that strengthen your
    allies and three <strong>Dirges</strong> that sap your foes. You may weave
    multiple Chants together to craft an evolving chorus of battle, but you
    require the continued strikes of your weapon to fuel their
    song.</p><p>Beginning a chant creates an aura around you that affects other
    creatures on their respective turns and lasts for one Round. Whenever you
    successfully hit with a <strong>Melee</strong> attack, your Chant that is
    nearest to expiring is extended by one <strong>Round</strong>.</p>
  actions:
    - id: songOfMight
      name: Song of the Titan's Might
      img: icons/magic/control/buff-strength-muscle-damage-orange.webp
      condition: ''
      description: >-
        <p>You raise a thunderous anthem to the <strong>Titan</strong>, whose
        strength once toppled leviathans. You and allied creatures within
        <strong>15 feet</strong> gain <strong>+1 Strength</strong> and
        <strong>+1 Wisdom</strong>.</p>
      tags:
