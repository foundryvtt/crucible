system:
  description: >-
    <p>You excel in applying the skills of<strong> Arcana</strong>,
    <strong>Glyphweaving</strong>, and <strong>Enchanting</strong> to create
    innovative and practical equipment. You can perform temporary modification
    of equipment to apply affix enchantments or to deepen the strength of a
    particular enchantment.</p>
  actions:
    - id: imbueAffix
      name: Imbue Affix
      condition: ''
      description: >-
        <p>Over the course of a during a @Action[default rest], you channel
        arcane energy into your equipment, inscribing an <strong>Affix</strong>
        as a temporary enchantment. Choose one physical item that has capacity
        for enchantment and temporarily imbue it with a <strong>Tier 1</strong>
        <strong>Affix</strong> of your choice. The imbued <strong>Affix</strong>
        persists until you use <strong>Imbue Affix</strong> again.</p><h3
        class="divider">Playtest Notes</h3><p>You may currently imbue any affix
        that the chosen item can bear. In a future update this will be limited
        to affixes which you are able to <strong>Enchant</strong>.</p>
