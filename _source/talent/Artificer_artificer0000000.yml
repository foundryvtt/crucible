    - id: amplifyAffix
      name: Amplify Affix
      condition: ''
      description: >-
        <p>Over the course of a @Action[default rest], you deepen the potency of
        an <strong>Affix</strong> enchantment on one of your items. Choose one
        <strong>Affix</strong> on a physical item you have equipped and increase
        the <strong>Tier</strong> of that affix by one, up to its maximum. This
        amplification persists until you use <strong>Amplify Affix</strong>
        again.</p>
