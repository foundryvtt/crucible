    - id: overrun
      name: Overrun
      img: icons/magic/sonic/explosion-impact-shock-wave.webp
      condition: ''
      description: >-
        <p>You lower your shoulder and charge in a straight line, bowling over
        those who stand in your way.</p><p>Move up to twice your
        <strong>Stride</strong> in a straight line, passing through the space of
        any creature that you could
        @Action[Compendium.crucible.talent.Item.unarmedCombatTra grapple]. You
        make an <strong>Athletics</strong> skill attack against the
        <strong>Reflex</strong> defense of each target, on a success dealing
        <strong>Bludgeoning</strong> damage and knocking the creature
        @Condition[prone].</p><p>Your charge is halted by any creature too
        massive for you to Grapple, which is unaffected by the attack.</p>
