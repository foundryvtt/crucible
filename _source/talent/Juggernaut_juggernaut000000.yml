name: Juggernaut
type: talent
img: icons/magic/control/buff-strength-muscle-damage-orange.webp
system:
  description: >-
    <p>You thrive on physical contest, using your extraordinary brawn and grit
    to overpower creatures whose bulk outstrips even your own. When you
    @Action[Compendium.crucible.talent.Item.unarmedCombatTra grapple] a
    creature, you are not @Condition[restrained] yourself. The
    <strong>Size</strong> of creature that you can <strong>Grapple</strong> and
    be <strong>Grappled</strong> by increases by +1.</p>
  actions:
    - id: throw
      name: Throw
      img: icons/magic/control/buff-strength-muscle-damage-orange.webp
      condition: You have a creature Grappled.
      description: >-
        <p>You heave the target of your
        @Action[Compendium.crucible.talent.Item.unarmedCombatTra grapple]
        through the air towards a target point up to a distance of two times
        your <strong>Strength</strong> score.</p><p>You make an
        <strong>Athletics</strong> skill attack against the
        <strong>Reflex</strong> defense of your grappled target. On a success
        the target is thrown, leaving it @Condition[prone]. If its movement is
        stopped short by a wall or another creature, it slams into the obstacle
        and suffers <strong>Bludgeoning</strong> damage from the attack. A
        creature hurled into open space takes no damage from the throw itself,
        although it may @Action[default fall].</p><p>Regardless of the outcome,
        your <strong>Grapple</strong> is released as part of this action.</p>
      tags:
        - reflex
        - bludgeoning
        - skill
        - athletics
      cost:
        action: 2
        focus: 0
        heroism: 0
        hands: 0
        weapon: false
