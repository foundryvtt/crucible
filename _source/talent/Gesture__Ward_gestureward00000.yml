name: 'Gesture: Ward'
type: talent
img: icons/magic/defensive/shield-barrier-glowing-blue.webp
system:
  description: >-
    <p>You shape the arcane power of a <strong>Rune</strong> into a protective
    barrier used to shield yourself from harm.</p><p>The <strong>Ward</strong>
    gesture scales using <strong>Toughness</strong> and provides <strong>+6
    Resistance</strong> against the damage type of the <strong>Rune</strong>
    used in the spell. This resistance lasts for <strong>1 Round</strong> and
    you may only have a single <strong>Ward</strong> at a time. Casting another
    spell using the <strong>Ward</strong> gesture replaces your prior
    <strong>Ward</strong>. This gesture requires <strong>1 Hand</strong> to cast
    and has a base cost of <strong>2 Action</strong> and <strong>1
    Focus</strong>.</p>
