name: Adversaries
_id: v1dqTT3NI35lFNxM
pages:
  - sort: 100000
    name: Overview
    type: text
    _id: WH0YSVcYo09aHNZ2
    title:
      show: true
      level: 1
    image: {}
    text:
      format: 1
      content: >-
        <p><strong>Adversaries</strong> in Crucible are the non-player
        characters which populate and inhabit the world. Despite the name, not
        all adversaries are antagonistic in nature, we simply use the term
        "Adversary" to refer to non-player actors in the
        system.</p><p>Adversaries share most mechanical concepts in common with
        @UUID[Compendium.crucible.rules.JournalEntry.gszlBVQ5fGh3y0I6.JournalEntryPage.DjePpoV2oJenlyTf]{Overview}
        (player characters) including Ability Scores, Resources, Defenses,
        Skills, Resistances, and Talents, but adversaries progress somewhat
        differently than player characters.</p><p><strong>Threat Level
        </strong>describes the degree of mechanical challenge posed by a certain
        Adversary and is defined by the product of <strong>Level</strong> and
        <strong>Threat Category</strong>. An adversaries attributes and
        difficulty scale with higher level and higher Threat
        Category.</p><section class="formula"><p class="value">Threat
        Level</p><p class="equals">=</p><p class="equation">Level × Threat
        Multiplier</p></section><h2 class="divider">Threat
        Categories</h2><p>Each Threat Category contributes a multiplier to the
        effective <strong>Threat Level</strong> of the Adversary and also
        determines the number of
        @UUID[Compendium.crucible.rules.JournalEntry.QhZgmBrdLAGwYy5c.JournalEntryPage.2U2k8WcnB1gbPLfd]{Action
        Points} that the Adversary has in combat. The Threat Categories in the
        Crucible system are:</p><table><thead><tr><th><p>Threat
        Category</p></th><th><p>Threat Multiplier</p></th><th><p>Action
        Points</p></th><th
        style="width:50%"><p>Description</p></th></tr></thead><tbody><tr><td><p>Minion</p></td><td><p>×
        0.5</p></td><td><p>2</p></td><td><p>Weaker than average foes at a given
        level, minions are less dangerous and more easily dispatched - but may
        be numerous in quantity.</p></td></tr><tr><td><p>Normal</p></td><td><p>×
        1</p></td><td><p>3</p></td><td><p>The standard level of difficulty and
        challenge for a certain
        level.</p></td></tr><tr><td><p>Elite</p></td><td><p>×
        1.5</p></td><td><p>4</p></td><td><p>Stronger than average foes at a
        given level, elites are more dangerous and more difficult to dispatch.
        Elites are more rarely
        encountered.</p></td></tr><tr><td><p>Boss</p></td><td><p>×
        2</p></td><td><p>5</p></td><td><p>Especially dangerous enemies which
        represent the ultimate degree of challenge at a certain level. Most
        encounters do not contain a boss.</p></td></tr></tbody></table><h2
        class="divider">Defeating Adversaries</h2><p>Most Adversaries do not
        have <strong>Wounds</strong> or <strong>Madness</strong> pools like
        Protagonist characters; their ability to withstand harm is determined
        entirely by <strong>Health</strong> and
        <strong>Morale</strong>.</p><p>When an Adversary <strong>Health</strong>
        pool reaches zero it becomes @Condition[dead] or, if preferred by the
        Gamemaster for narrative reasons, @Condition[incapacitated], and takes
        no further action during the encounter.</p><p>When Adversary
        <strong>Morale</strong> reaches zero it becomes @Condition[broken]. A
        Broken Adversary will attempt to flee the battlefield unless they lack
        instincts of self-preservation or the possibility of escape seems
        impossible - in which case they will continue to fight to the
        death.</p><h2 class="divider">Important Adversaries</h2><p>Some
        Adversaries are recurring antagonists, named villains, or other
        narratively significant figures who must withstand damage sustained over
        the course of many encounters. The Gamemaster may designate such an
        Adversary as <strong>Important</strong>.</p><p>An Important Adversary
        tracks <strong>Wounds</strong> and <strong>Madness</strong> meters in
        the same fashion as a Protagonist. Health damage that would reduce the
        Adversary below zero Health overflows into Wounds, and Morale damage
        that would reduce them below zero Morale overflows into Madness. The
        Adversary becomes @Condition[dead] when their Wounds meter reaches its
        maximum, and @Condition[insane] when their Madness meter reaches its
        maximum.</p><p>The size of an Important Adversary's Wounds and Madness
        reservoirs scales with their Level and Size, but is independent of
        <strong>Threat Category</strong>. An Important Elite or Boss therefore
        shares the same reservoir size as an Important Normal Adversary of the
        same Level and Size, while an Important Minion has correspondingly
        smaller reservoirs. Threat Category dictates how dangerous the Adversary
        is in combat; their Important designation dictates how much sustained
        harm they may endure outside it.</p><h2 class="divider">Attribute
        Scaling</h2><p>Where Protagonists feature an <strong>Ancestry</strong>
        and <strong>Background</strong>, instead Adversaries use the concepts of
        @UUID[.qSeJNy28eK9axO7C]{Taxonomy} and
        @UUID[.O8IesdQo8SQpIKbo]{Archetype}, both of which define how the
        attributes of the Adversary progress as it increases in Threat
        Level.</p><h2 class="divider">Talent Progression</h2><p>An Adversary's
        @UUID[.qSeJNy28eK9axO7C]{Taxonomy} and
        @UUID[.O8IesdQo8SQpIKbo]{Archetype} each provide a set of Talents, and
        each granted Talent is assigned a Level at which it is attained. As the
        Adversary increases in Level it automatically acquires the Talents its
        progression has unlocked, modeling how more dangerous foes exhibit more
        formidable abilities.</p><section
        class="foundryvtt"><h4>Automation</h4><p>Granted Talents are added
        automatically when the Adversary reaches the Level at which each is
        attained, and are removed automatically if its Level is later reduced
        below that threshold.</p></section><p>Adversaries may also be assigned
        additional bespoke Talents beyond those provided by their Taxonomy and
        Archetype at the Gamemaster's discretion.</p><h2 class="divider">Skill
        Progression</h2><p>An Adversary's @UUID[.O8IesdQo8SQpIKbo]{Archetype}
        designates the skills favored by its combat style. The Adversary's
        training rank in each designated skill advances automatically as it
        increases in Level, one rank every 6
        levels:</p><table><thead><tr><th><p>Training
        Rank</p></th><th><p>Level</p></th></tr></thead><tbody><tr><td><p>Trained</p></td><td><p>5
        or lower</p></td></tr><tr><td><p>Proficient</p></td><td><p>6 to
        11</p></td></tr><tr><td><p>Expert</p></td><td><p>12 to
        17</p></td></tr><tr><td><p>Master</p></td><td><p>18+</p></td></tr></tbody></table><p>Automatic
        skill progression establishes a minimum training rank; it never reduces
        a higher rank which has been manually assigned. This same progression
        advances the <strong>Natural</strong> weapon training of Adversaries
        whose Taxonomy cannot use equipment.</p><h2 class="divider">Equipment
        Progression</h2><p>An Adversary may be granted equipment by its
        @UUID[.qSeJNy28eK9axO7C]{Taxonomy} or
        @UUID[.O8IesdQo8SQpIKbo]{Archetype}, each item with a configured
        quantity and equipped state. If the Taxonomy cannot use typical humanoid
        equipment, granted equipment is limited to <strong>Natural
        Weapons</strong> and <strong>Natural Armor</strong> - claws, fangs,
        hides, chitin, and similar anatomical armaments. A selection of
        prefabricated natural weapon and armor options is provided in the
        <strong>Adversary Equipment</strong> compendium pack.</p><p>Granted
        equipment may optionally scale automatically in <strong>Quality</strong>
        as the Adversary increases in Level, representing the growing potency of
        a more dangerous creature's armaments. Automatically scaled equipment
        steps up one Quality tier every 6
        levels:</p><table><thead><tr><th><p>Quality</p></th><th><p>Weapons</p></th><th><p>Armor</p></th></tr></thead><tbody><tr><td><p>Shoddy</p></td><td><p>Level
        ½ or lower</p></td><td><p>Level ⅓ or
        lower</p></td></tr><tr><td><p>Standard</p></td><td><p>Level 1 to
        4</p></td><td><p>Level ½ to
        3</p></td></tr><tr><td><p>Fine</p></td><td><p>Level 5 to
        10</p></td><td><p>Level 4 to
        9</p></td></tr><tr><td><p>Superior</p></td><td><p>Level 11 to
        16</p></td><td><p>Level 10 to
        15</p></td></tr><tr><td><p>Masterwork</p></td><td><p>Level
        17+</p></td><td><p>Level 16+</p></td></tr></tbody></table><section
        class="foundryvtt"><h4>Automation</h4><p>Equipment granted by a Taxonomy
        or Archetype is created automatically when that item is applied to an
        Adversary. Automatically scaled equipment updates its Quality whenever
        the Adversary's Level changes. Manually changing the Quality of an
        automatically scaled item releases it from automatic scaling, leaving it
        under your control thereafter.</p></section>
