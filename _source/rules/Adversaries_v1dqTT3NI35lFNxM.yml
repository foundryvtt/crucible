  - sort: 300000
    name: Archetype
    type: text
    _id: O8IesdQo8SQpIKbo
    title:
      show: true
      level: 1
    image: {}
    text:
      format: 1
      content: >-
        <p><strong>Archetype</strong> defines the skills and combat style of an
        <strong>Adversary</strong> in Crucible. Each Archetype further defines a
        taxonomy to:</p><ul><li><p>Refine scaling weights for
        @UUID[Compendium.crucible.rules.JournalEntry.characterMechani.JournalEntryPage.abilityScores000]{Abilities}
        (above and beyond those defined by the Taxonomy), </p></li><li><p>Define
        automatic @UUID[.WH0YSVcYo09aHNZ2]{Skill
        Progression}</p></li><li><p>Configure granted equipment which may
        automatically scale in quality, as described under
        @UUID[.WH0YSVcYo09aHNZ2]{Equipment Progression}</p></li><li><p>Provides
        a set of automatically attained
        @UUID[Compendium.crucible.rules.JournalEntry.characterMechani.JournalEntryPage.talents000000000]{Talents},
        each gated by the Level at which it is attained</p></li></ul><section
        class="gameplay"><h4>Example: Fighter Archetype</h4><p>Hardened melee
        combatants expert at wielding one-handed weaponry, shield, and heavy
        armor.</p><p>The Fighter Archetype defines scaling weights such that
        emphasize faster progression of Strength and Toughness, normal
        progression of Presence and Dexterity, and slower progression of Wisdom
        and Intellect.</p><p>Furthermore, the Fighter Archetype provides the
        <strong>Martial Weapon Training</strong>, <strong>Bulwark</strong>, and
        <strong>Armored Efficiency</strong> talents.</p></section><p>Many
        different Adversaries will use the same Archetype. For example a Level 2
        <strong>Bandit Fighter</strong>, a Level 4 <strong>Hobgoblin
        Fighter</strong>, and a Level 7 <strong>Hellguard</strong> all share the
        Fighter Archetype, but they each have different Taxonomies and therefore
        have different attributes and talents, but all share a common aspect of
        progression due to the Fighter Archetype.</p>
