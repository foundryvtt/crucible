  - sort: 200000
    name: Taxonomy
    type: text
    _id: qSeJNy28eK9axO7C
    title:
      show: true
      level: 1
    image: {}
    text:
      format: 1
      content: >-
        <p><strong>Taxonomy</strong> classifies the biology of an
        <strong>Adversary</strong> in Crucible. Each Taxonomy defines a variety
        of basic properties:</p><ul><li><p>Category (such as whether a creature
        is an Beast, Celestial, Humanoid, etc.)</p></li><li><p>Base size of an
        adversary (in grid spaces)</p></li><li><p>Stride (movement speed in
        feet)</p></li><li><p>Whether the creature can wear typical humanoid
        equipment or cast
        spells</p></li><li><p>@UUID[Compendium.crucible.rules.JournalEntry.characterMechani.JournalEntryPage.abilityScores000]{Abilities}
        which determine baseline
        attributes</p></li><li><p>@UUID[Compendium.crucible.rules.JournalEntry.characterMechani.JournalEntryPage.Resistances00000]{Resistances}
        and Immunities which define how damage resistances scale with threat
        level and whether the creature is immune to any specific types of
        damage.</p></li><li><p>Any talents that all creatures with this taxonomy
        should start with</p></li></ul><section class="gameplay"><h4>Example:
        Hobgoblin Taxonomy</h4><p>Hobgoblins are humanoids which typically
        congregate in martial societies which are orderly and disciplined.
        Hobgoblins are both cunning and uncompromising, making dangerous foes or
        powerful allies.</p><p>The Hobgoblin Taxonomy defines scaling weights
        such that Strength, Intellect, and Toughness evolve more frequently
        while Wisdom, Presence, and Dexterity evolve more
        slowly.</p></section><p>Many different Adversaries will use the same
        Taxonomy, for example a Level 3 <strong>Hobgoblin Archer</strong>, Level
        4 <strong>Hobgoblin Fighter</strong>, and a Level 6 <strong>Hobgoblin
        Witch Doctor</strong>. Each of these adversaries might have a different
        @UUID[.O8IesdQo8SQpIKbo]{Archetype} and therefore have different
        attributes and talents, but they would all share a common progression
        from their shared Hobgoblin Taxonomy.</p>
