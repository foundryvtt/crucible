  - sort: 0
    name: Temperature
    type: text
    _id: temperature00000
    system: {}
    title:
      show: true
      level: 1
    image: {}
    text:
      format: 1
      content: >-
        <p>Environments in Crucible may be broadly classified into five
        different Temperature tiers from coldest to
        hottest.</p><dl><dt><p>Gelid</p></dt><dd><p>Freezing cold and
        inhospitable to any life that is not specifically adapted to conditions
        of extreme cold.</p></dd></dl><dl><dt><p>Cool</p></dt><dd><p>Cool or
        cold temperatures that may be uncomfortable for warm-bodied creatures,
        but are not generally
        dangerous.</p></dd></dl><dl><dt><p>Neutral</p></dt><dd><p>Typical
        environmental temperature, generally not
        noteworthy.</p></dd></dl><dl><dt><p>Warm</p></dt><dd><p>Warm or hot
        temperatures that may be uncomfortable for cool-bodied creatures, but
        are not generally
        dangerous.</p></dd></dl><dl><dt><p>Boiling</p></dt><dd><p>Burning hot
        and inhospitable to any life that is not specifically adapted to
        conditions of extreme heat.</p></dd></dl><p>These temperature tiers are
        also used to model the body temperature of creatures. Some mechanics
        depend on the temperature of the environment. Some mechanics depend on
        the temperature of a creature. Some mechanics involve the interaction of
        the two. In all cases, these temperature keywords will be used.</p>
