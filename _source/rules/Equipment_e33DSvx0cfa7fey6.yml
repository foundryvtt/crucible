  - sort: 275000
    name: Consumables
    type: text
    _id: Text000000000000
    system: {}
    title:
      show: true
      level: 1
    image: {}
    text:
      format: 1
      content: >-
        <p><strong>Consumables</strong> are single-use or limited-use items that
        are expended when activated. Consumables can be browsed in the
        <strong>Crucible &gt; Items &gt; Equipment</strong> compendium
        pack.</p><p>Unlike weapons, armor, and accessories, consumable items do
        not have an enchantment tier. Their effectiveness scales based on
        <strong>Quality</strong> alone. Higher quality consumables are more
        potent but also more expensive.</p><p>Characters have 3 toolbelt slots
        by default. Consumable items and tools must be equipped to a toolbelt
        slot to be readily available for use during combat.</p><h2
        class="divider">Consumable Categories</h2><p>Consumables are organized
        into the following
        categories:</p><dl><dt><p>Ammunition</p></dt><dd><p>Projectiles and
        other expendable materials used by ranged weapons. Ammunition is
        consumed automatically when the associated weapon is
        used.</p></dd><dt><p>Bomb</p></dt><dd><p>Explosive or volatile
        substances that can be thrown at a target area. Bombs typically deal
        area damage and may apply status
        effects.</p></dd><dt><p>Flask</p></dt><dd><p>Drinkable liquids including
        healing elixirs, tonics, and other alchemical preparations. Flasks
        provide immediate effects when
        consumed.</p></dd><dt><p>Kit</p></dt><dd><p>Collections of tools or
        supplies that enable specific activities such as crafting, healing, or
        field work.</p></dd><dt><p>Scroll</p></dt><dd><p>Enchanted parchments
        containing spellcraft components. See the <strong>Spell Scrolls</strong>
        section below for detailed
        rules.</p></dd><dt><p>Trap</p></dt><dd><p>Mechanical or magical devices
        that can be placed to trigger when a creature enters their
        area.</p></dd><dt><p>Other</p></dt><dd><p>Consumables that do not fit
        neatly into other categories.</p></dd></dl><h2
        class="divider">Consumable Properties</h2><p>Consumables may have the
        following special properties:</p><h4>Thrown</h4><p>This consumable can
        be used at range, typically by throwing it at a target or target area.
        The effective range depends on the specific item.</p><h2
        class="divider">Spell Scrolls</h2><p>A <strong>Spell Scroll</strong> is
        a specialized piece of vellum or parchment upon which are carefully
        inlaid the glyphs of one or more spellcraft components. Activating a
        spell scroll temporarily imbues its reader with familiarity with those
        components as if they have known them for years.</p><p>The number of
        spellcraft components a scroll can contain depends on the quality of its
        construction:</p><table><thead><tr><th><p>Quality</p></th><th><p>Components</p></th></tr></thead><tbody><tr><td><p>@UUID[Compendium.crucible.equipment.Item.spellScrollFine0]{Spell
        Scroll
        (Fine)}</p></td><td><p>1</p></td></tr><tr><td><p>@UUID[Compendium.crucible.equipment.Item.spellScrollSuper]{Spell
        Scroll
        (Superior)}</p></td><td><p>2</p></td></tr><tr><td><p>@UUID[Compendium.crucible.equipment.Item.spellScrollMaste]{Spell
        Scroll
        (Masterwork)}</p></td><td><p>3</p></td></tr></tbody></table><p>Spellcraft
        components include <strong>Runes</strong> (which determine the elemental
        school of a spell), <strong>Gestures</strong> (which determine the
        physical form of a spell), and <strong>Inflections</strong> (which
        modify how a spell behaves). A scroll may contain any combination of
        these component types up to its capacity.</p><p>Scrolls can be activated
        with the @Action[Compendium.crucible.equipment.Item.spellScrollFine0
        readScroll] Action, which grants the reader with temporary knowledge of
        its components. Only one spell scroll effect may be active at a time;
        reading a different scroll replaces any current effect. The scroll is
        consumed upon use.</p>
