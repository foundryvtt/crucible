  - sort: 0
    name: Equipment Overview
    type: text
    _id: 6QxbcLoOhUkXTbAj
    title:
      show: true
      level: 1
    image: {}
    text:
      format: 1
      content: >-
        <p><strong>Equipment</strong> refers to the belongings, weaponry, armor,
        potions, adventuring equipment, and other types of items which could be
        carried by a character or found somewhere within the world. Equipment of
        all types is provided and can be browsed in the <strong>Crucible &gt;
        Items &gt; Equipment</strong> compendium pack.</p><h2
        class="divider">Equipment Properties</h2><p>Equipment items share a few
        properties in common across all types:</p><h4>Weight</h4><p>Each item
        has a per-unit weight, expressed in pounds.</p><h4>Base Cost</h4><p>The
        base cost of an item establishes the basis for any cost scaling which
        later applies. For some items the base cost and scaled cost are always
        the same, but some items can have a true value many times greater than
        the item's base cost.</p><h4>Physical Quality</h4><p>Many items may be
        assigned a quality tier which reflects the manufacturing quality or
        natural rarity of a certain commodity.</p><h4>Enchantment
        Tier</h4><p>Weapons, armor, and accessories can be augmented with magic
        through @UUID[.Affixes000000000]{Affixes}. The enchantment tier of an
        item reflects the potency of its magical imbuement and is derived
        automatically from the affixes applied to it. Consumable items do not
        have an enchantment tier and scale based on quality
        alone.</p><h4>Rarity</h4><p>Item rarity quantifies the uniqueness of the
        item relative to its most common form. Items with higher manufactured
        quality, stronger magical enchantment, or special properties will have a
        higher rarity value and therefore a greater
        value.</p><h4>Investment</h4><p>Some items, particularly accessories,
        require the bearer to <strong>invest</strong> in them before their
        magical effects become active. An invested item must be both equipped
        and invested to function. A character may invest in any number of
        equipped items.</p><h4>Unique Items</h4><p>Some items are designated as
        <strong>Unique</strong>, representing one-of-a-kind artifacts or items
        of singular craftsmanship. Unique items cannot be enchanted with affixes
        and instead retain a manually assigned enchantment tier.</p><h2
        class="divider">Investment</h2><p>Some items require
        <strong>Investment</strong> in order to fully benefit from their
        properties. Items which require Investment may be Equipped and used to
        perform Actions as normal, however their owner does not benefit the
        effects of that item's Affixes unless the item is first
        <strong>Invested</strong>.</p><p>This is done through the
        @Action[Compendium.crucible.pregens.Actor.iPMperuo6ZvBLnp9 investiture]
        action which may only be performed during a Recovery or Rest. Once an
        Item is Invested, all of its magical affixes provide their full benefit
        including any special Actions which they permit the Actor to
        perform.</p><p>When performing the
        @Action[Compendium.crucible.pregens.Actor.iPMperuo6ZvBLnp9 recover] or
        @Action[Compendium.crucible.pregens.Actor.iPMperuo6ZvBLnp9 rest]
        Actions, any Item that was previously Invested but is now unequipped
        will no longer be invested.</p><h2 class="divider">Item Value
        Scaling</h2><p>The base cost of an item is defined by its Standard
        quality, Mundane enchantment variety. The currency cost of the item
        scales with its Rarity score according to the following
        formula:</p><section class="formula"><p class="value">Item Value</p><p
        class="equals">=</p><p class="equation">(1 + Rarity^3) x Base
        Cost</p></section><section class="gameplay"><p>Suppose a
        <strong>Standard</strong> quality and unenchanted
        <strong>Mundane</strong> Longsword has a base cost of 50. The same type
        of weapon crafted at <strong>Masterwork</strong> quality would cost
        3200. If a <strong>Legendary</strong> enchantment were added to the
        weapon through affixes, it would then cost 25,650. A true
        fortune!</p></section>
