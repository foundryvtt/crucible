  - sort: 300000
    name: Affixes
    type: text
    _id: Affixes000000000
    system: {}
    title:
      show: true
      level: 1
    image: {}
    text:
      format: 1
      content: >-
        <p><strong>Affixes</strong> are magical effects that can be applied to
        @UUID[.LYj7sghAMoQj9FFR]{Weapons}, @UUID[.JTsl6ENdxSDW765Q]{Armor}, or
        @UUID[.Accessories00000]{Accessories} to augment them with enchantments.
        A browsable compendium of available affixes is provided in the
        <strong>Crucible &gt; Items &gt; Affixes</strong> compendium
        pack.</p><p>Items discovered in the world may already contain affixes,
        or you can customize items by applying new affixes through crafting
        using the
        @UUID[Compendium.crucible.rules.JournalEntry.crucibleCrafting.JournalEntryPage.glyphweaving0000]{Glyphweaving}
        and
        @UUID[Compendium.crucible.rules.JournalEntry.crucibleCrafting.JournalEntryPage.enchanting000000]{Enchanting}
        tradeskills.</p><h2 class="divider">Prefix and Suffix</h2><p>Every affix
        is categorized as either a <strong>Prefix</strong> or a
        <strong>Suffix</strong>. This categorization determines how the affix
        contributes to the item's enchantment budget and how it modifies the
        item's name.</p><p>Crafted items can (optionally) be automatically named
        based on their affixes. A <strong>Prefix</strong> affix contributes an
        adjective that is prepended to the item name (e.g., a <em>Keen</em>
        Longsword). A <strong>Suffix</strong> affix contributes a noun that is
        appended with "of" (e.g., a Longsword of <em>Potency</em>). An item with
        both might be named a <em>Keen</em> Longsword of
        <em>Potency</em>.</p><h2 class="divider">Affix Properties</h2><p>Each
        affix has the following properties:</p><dl><dt><p>Affix
        Type</p></dt><dd><p>Specifies whether the affix is a
        <strong>Prefix</strong> or a
        <strong>Suffix</strong>.</p></dd></dl><dl><dt><p></p></dt><dt><p>Tier</p></dt><dd><p>The
        power level of the affix, ranging from 1 to 3. Higher tiers produce
        stronger effects but consume more of the item's enchantment budget. Many
        affixes scale their mechanical effect linearly with
        tier.</p></dd><dt><p>Item Types</p></dt><dd><p>Which equipment types the
        affix can be applied to. Some affixes work on any affixable item, while
        others are restricted to specific types such as weapons only or armor
        and accessories.</p></dd></dl><dl><dt><p>Adjective</p></dt><dd><p>The
        word used when composing the enchanted item name. For prefixes this is
        prepended as an adjective; for suffixes it is appended as a noun with
        "of".</p></dd></dl><dl><dt><p></p></dt><dt><p>Actions</p></dt><dd><p>Some
        affixes grant usable actions to the bearer. These actions appear on the
        item alongside any actions the item natively provides and can be
        activated during combat or exploration.</p></dd></dl><h2
        class="divider">Enchantment Budget</h2><p>The total affix capacity of an
        item is determined by its <strong>Quality</strong> tier. This capacity
        is split equally between prefixes and suffixes. Each affix's tier value
        counts against the budget for its
        category.</p><table><thead><tr><th><p>Quality</p></th><th><p>Total
        Capacity</p></th><th><p>Prefix Budget</p></th><th><p>Suffix
        Budget</p></th></tr></thead><tbody><tr><td><p>Shoddy</p></td><td><p>0</p></td><td><p>0</p></td><td><p>0</p></td></tr><tr><td><p>Standard</p></td><td><p>0</p></td><td><p>0</p></td><td><p>0</p></td></tr><tr><td><p>Fine</p></td><td><p>2</p></td><td><p>1</p></td><td><p>1</p></td></tr><tr><td><p>Superior</p></td><td><p>4</p></td><td><p>2</p></td><td><p>2</p></td></tr><tr><td><p>Masterwork</p></td><td><p>6</p></td><td><p>3</p></td><td><p>3</p></td></tr></tbody></table><p>An
        item cannot have duplicate affixes. You can mix and match affixes freely
        within the budget. For example, a <strong>Fine</strong> item could have
        one Tier 1 prefix and one Tier 1 suffix. A <strong>Masterwork</strong>
        item could have one Tier 3 prefix and three Tier 1 suffixes, or one Tier
        2 prefix, one Tier 1 prefix, and a Tier 3 suffix, among many other
        combinations.</p><p>The item's <strong>Enchantment Tier</strong> is
        derived automatically from the total tier value of its affixes. Items
        with no affixes are considered <strong>Mundane</strong>.</p><h2
        class="divider">Unique Items</h2><p>Items designated as
        @UUID[.6QxbcLoOhUkXTbAj]{Unique} cannot be enchanted with affixes. These
        are one-of-a-kind artifacts with manually assigned enchantment tiers
        that exist outside the standard affix system.</p>
