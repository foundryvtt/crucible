  - sort: 250000
    name: Accessories
    type: text
    _id: Accessories00000
    system: {}
    title:
      show: true
      level: 1
    image: {}
    text:
      format: 1
      content: >-
        <p><strong>Accessories</strong> are wearable items that provide magical
        or practical benefits to the bearer. Accessories can be browsed in the
        <strong>Crucible &gt; Items &gt; Equipment</strong> compendium
        pack.</p><p>Characters have 3 accessory slots by default. Each accessory
        must be equipped to one of these slots to function. Most accessories
        also require @UUID[.6QxbcLoOhUkXTbAj]{Investment}, meaning they must be
        both equipped and invested before their magical effects become
        active.</p><p>Like weapons and armor, accessories have a physical
        <strong>Quality</strong> tier and a magical <strong>Enchantment</strong>
        tier. The enchantment tier is derived from
        @UUID[.Affixes000000000]{Affixes} applied to the item. Higher quality
        accessories can support more powerful affix combinations.</p><h2
        class="divider">Accessory Categories</h2><p>Accessories are organized
        into the following
        categories:</p><dl><dt><p>Clothing</p></dt><dd><p>Wearable garments such
        as cloaks, capes, boots, and gloves. Clothing accessories are typically
        visible and may carry enchantments related to protection or
        mobility.</p></dd><dt><p>Jewelry</p></dt><dd><p>Rings, amulets, bracers,
        and other ornamental items. Jewelry is the most common vehicle for
        magical enchantment and frequently carries powerful
        affixes.</p></dd><dt><p>Trinket</p></dt><dd><p>Small objects such as
        charms, tokens, or talismans. Trinkets are often unique or unusual items
        with specialized
        effects.</p></dd><dt><p>Other</p></dt><dd><p>Accessories that do not fit
        neatly into other categories.</p></dd></dl><h2 class="divider">Accessory
        Properties</h2><p>Accessories may have the following special
        properties:</p><h4>Investment</h4><p>This accessory requires
        <strong>Investment</strong> to function. The item must be both equipped
        and invested before its magical effects become active. See
        @UUID[.6QxbcLoOhUkXTbAj]{Equipment Overview} for more details.</p>
