  - sort: 100000
    name: Weapons
    type: text
    _id: LYj7sghAMoQj9FFR
    title:
      show: true
      level: 1
    image: {}
    text:
      format: 1
      content: >-
        <p><strong>Weapons</strong> are a specific Item type which represents
        items that are wielded in a character's hands and used in combat. The
        Crucible system provides the basic rules for creating and classifying
        weapons, and also provides an array of pre-defined weapon types which
        are typically observed in a fantasy role-playing game. These weapons can
        be browsed in the <strong>Weapons </strong>Compendium
        pack.</p><p>Weapons all have the following attributes, in addition to
        those shared by all items:</p><h4>Category</h4><p>The category of a
        weapon establishes certain parameters about how that weapon may be used.
        How many hands does it require to wield? Is it a melee weapon or a
        ranged weapon? Does it require ammunition? Which ability scores modify
        its usage? And more. The possible weapon categories are listed in the
        table below.</p><h4>Damage Type</h4><p>Each weapon deals a specific
        damage type when it inflicts damage in combat.</p><h4>Weapon
        Properties</h4><p>Weapons may have a number of special properties which
        instill that item with special rules functionality described in the
        table below.</p><h2 class="divider">Weapon Categories</h2><p>The
        following table lists the categories of weapons supported in the
        Crucible game system.</p><table><thead><tr><th
        style="width:30%"><p>One-Handed Melee</p></th><th
        style="width:20%"><p>Scaling</p></th><th
        style="width:10%"><p>Range</p></th><th
        style="width:10%"><p>Action</p></th><th
        style="width:10%"><p>Damage</p></th><th><p>Special</p></th></tr></thead><tbody><tr><td><p>Natural</p></td><td><p>STR</p></td><td><p>1</p></td><td><p>2</p></td><td><p>3</p></td><td><p>Offhand</p></td></tr><tr><td><p>Unarmed</p></td><td><p>STR,DEX</p></td><td><p>1</p></td><td><p>2</p></td><td><p>3</p></td><td><p>Offhand</p></td></tr><tr><td><p>Light
        (1h)</p></td><td><p>DEX</p></td><td><p>1</p></td><td><p>2</p></td><td><p>3</p></td><td><p>Offhand</p></td></tr><tr><td><p>Simple
        (1h)</p></td><td><p>STR</p></td><td><p>1</p></td><td><p>2</p></td><td><p>4</p></td><td><p>Offhand</p></td></tr><tr><td><p>Balanced
        (1h)</p></td><td><p>STR,
        DEX</p></td><td><p>2</p></td><td><p>2</p></td><td><p>4</p></td><td><p>Offhand</p></td></tr><tr><td><p>Heavy
        (1h)</p></td><td><p>STR</p></td><td><p>2</p></td><td><p>3</p></td><td><p>6</p></td><td><p></p></td></tr><tr><th><p>Two-Handed
        Melee</p></th><th style="width:20%"><p>Scaling</p></th><th
        style="width:10%"><p>Range</p></th><th
        style="width:10%"><p>Action</p></th><th
        style="width:10%"><p>Damage</p></th><th><p>Special</p></th></tr><tr><td><p>Simple
        (2h)</p></td><td><p>STR</p></td><td><p>2</p></td><td><p>3</p></td><td><p>6</p></td><td><p></p></td></tr><tr><td><p>Balanced
        (2h)</p></td><td><p>STR,DEX</p></td><td><p>3</p></td><td><p>3</p></td><td><p>6</p></td><td><p></p></td></tr><tr><td><p>Heavy
        (2h)</p></td><td><p>STR</p></td><td><p>3</p></td><td><p>4</p></td><td><p>8</p></td><td><p></p></td></tr><tr><th><p>Ranged</p></th><th
        style="width:20%"><p>Scaling</p></th><th
        style="width:10%"><p>Range</p></th><th
        style="width:10%"><p>Action</p></th><th
        style="width:10%"><p>Damage</p></th><th><p>Special</p></th></tr><tr><td><p>Projectile
        (1h)</p></td><td><p>STR,DEX</p></td><td><p>60</p></td><td><p>2</p></td><td><p>4</p></td><td><p></p></td></tr><tr><td><p>Talisman
        (1h)</p></td><td><p>PRE</p></td><td><p>30</p></td><td><p>2</p></td><td><p>2</p></td><td><p>Refocus</p></td></tr><tr><td><p>Mechanical
        (1h)</p></td><td><p>DEX</p></td><td><p>60</p></td><td><p>2</p></td><td><p>4</p></td><td><p>Reload</p></td></tr><tr><td><p>Projectile
        (2h)</p></td><td><p>STR,DEX</p></td><td><p>120</p></td><td><p>3</p></td><td><p>6</p></td><td><p></p></td></tr><tr><td><p>Talisman
        (2h)</p></td><td><p>PRE</p></td><td><p>30</p></td><td><p>3</p></td><td><p>3</p></td><td><p>Refocus</p></td></tr><tr><td><p>Mechanical
        (2h)</p></td><td><p>DEX</p></td><td><p>120</p></td><td><p>2</p></td><td><p>6</p></td><td><p>Reload</p></td></tr><tr><th><p>Offhand
        Only</p></th><th style="width:20%"><p>Scaling</p></th><th
        style="width:10%"><p>Range</p></th><th
        style="width:10%"><p>Action</p></th><th
        style="width:10%"><p>Damage</p></th><th><p>Special</p></th></tr><tr><td><p>Light
        Shield</p></td><td><p>DEX</p></td><td><p>1</p></td><td><p>2</p></td><td><p>2</p></td><td><p>Block</p></td></tr><tr><td><p>Heavy
        Shield</p></td><td><p>STR</p></td><td><p>1</p></td><td><p>2</p></td><td><p>3</p></td><td><p>Block</p></td></tr></tbody></table><h2
        class="divider">Quality Tier</h2><p><strong>Quality</strong> of a Weapon
        describes its craftsmanship, materials, and condition. Quality tiers
        provide an additional bonus to the base damage of the weapon and
        contribute towards its Rarity score.</p><table><thead><tr><th><p>Quality
        Tier</p></th><th><p>Damage Bonus</p></th><th><p>Rarity
        Modifier</p></th></tr></thead><tbody><tr><td><p>Shoddy</p></td><td><p>-2</p></td><td><p>-1</p></td></tr><tr><td><p>Standard</p></td><td><p>0</p></td><td><p>0</p></td></tr><tr><td><p>Fine</p></td><td><p>+1</p></td><td><p>+1</p></td></tr><tr><td><p>Superior</p></td><td><p>+2</p></td><td><p>+2</p></td></tr><tr><td><p>Masterwork</p></td><td><p>+3</p></td><td><p>+4</p></td></tr></tbody></table><p>The
        quality tier of a weapon is established at its time of initial creation
        and can never be increased after that point.</p><h4>Broken
        Weapons</h4><p>During the course of use, or over the passage of time,
        weapons may become <strong>Broken</strong>. Weapons which are Broken
        deal half their normal damage and cannot contribute to Block or Parry
        defenses. Repairing a Broken weapon restores it to its original quality
        tier or a lesser quality tier depending on the result of the
        <strong>Tradecraft </strong>skill check to repair the weapon.</p><h2
        class="divider">Enchantment Tier</h2><p><strong>Enchantment</strong> of
        a Weapon describes its level of magical imbuement. Enchantment tiers
        provide an additional bonus to attack rolls of the weapon and contribute
        towards its Rarity score.</p><table><thead><tr><th><p>Enchantment
        Tier</p></th><th><p>Attack Bonus</p></th><th><p>Rarity
        Modifier</p></th></tr></thead><tbody><tr><td><p>Mundane</p></td><td><p>0</p></td><td><p>0</p></td></tr><tr><td><p>Minor</p></td><td><p>+1</p></td><td><p>+2</p></td></tr><tr><td><p>Major</p></td><td><p>+2</p></td><td><p>+4</p></td></tr><tr><td><p>Legendary</p></td><td><p>+3</p></td><td><p>+6</p></td></tr></tbody></table><h2
        class="divider">Special Properties</h2><p>Some weapons may have one or
        multiple of the following special properties. Each property describes
        some physical characteristic of the weapon. While all properties provide
        some benefit, some also come with a tradeoff to ensure that they are not
        strictly superior to weapons which lack that
        property.</p><h4>Ambush</h4><p>This weapon can be easily concealed and
        retrieved quickly. This weapon may be drawn for free during your own
        turn or as part of a Reaction. Its compact size reduces its effective
        range by 1 foot for melee weapons or 10 feet for ranged
        weapons.</p><h4>Blocking</h4><p>This weapon provides +1 to Block defense
        while equipped and not Broken. The weapon's defensive design reduces its
        base damage by 1 for one-handed weapons or 2 for two-handed
        weapons.</p><h4>Engaging</h4><p>This weapon is designed to better allow
        you to combat multiple foes, increasing your Engagement by +1. The
        weapon's defensive design reduces its base damage by 1 for one-handed
        weapons or 2 for two-handed weapons.</p><h4>Oversized</h4><p>This weapon
        is large for its category and is unwieldy in combat without special
        training. The weapon gains +1 base damage for one-handed weapons or +2
        for two-handed weapons, but is slow and provides +2 Banes to Initiative
        rolls.</p><h4>Parrying</h4><p>This weapon provides +1 to Parry defense
        while equipped and not Broken. The weapon's defensive balance increases
        the critical hit threshold for Strikes made with this weapon by +1,
        making critical hits harder to achieve.</p><h4>Versatile</h4><p>This
        normally one-handed weapon can be used effectively with two hands. While
        equipped without any item in the off-hand its base damage is increased
        by +2 and Action cost is increased by +1.</p><h4>Thrown</h4><p>This
        weapon can be used to Strike at range up to a distance of 20 feet. When
        used to Strike a target that is not within melee range, the Weapon
        becomes unequipped and must be retrieved before it can be used
        again.</p>
