        Madness.</p><p>While a creature is Broken it cannot expend
        <strong>Focus</strong> and actions it takes suffer from <strong>+2
        Banes</strong>.</p><p>Creatures which are Broken cannot contribute
        towards Flanking. Non-player Adversaries which become Broken will
        attempt to flee the battle unless they lack instincts of
        self-preservation or escape seems impossible.</p>
