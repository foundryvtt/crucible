  - sort: 50000
    name: Removing Effects
    type: text
    category: BuMJalJaEUNCX29d
    _id: removingEffects0
    system: {}
    title:
      show: true
      level: 1
    image: {}
    text:
      format: 1
      content: >-
        <p>Conditions and other Active Effects usually end when their duration
        expires. Some, however, can be ended early - and how hard that is to do
        is set by the effect's <strong>Removal DC</strong>.</p><h2>Removal
        DC</h2><p>An effect that can be removed bears a numeric <strong>Removal
        DC</strong>. To end it before its duration runs out, a creature - or an
        ally acting on its behalf - makes the appropriate skill check, and the
        effect is removed only if the result <em>exceeds</em> the Removal DC. An
        effect with no Removal DC cannot be shed by these means and must simply
        be endured until it expires.</p><p>When an effect is applied by an
        action, its Removal DC reflects the power of whoever imposed it:
        typically 12 plus the relevant ability and skill behind the effect, or
        12 plus the originator's level. Effects inflicted by mightier foes are
        correspondingly harder to escape.</p><h2>Effect Properties</h2><p>An
        Active Effect may carry one or more <strong>Properties</strong>
        describing its nature and governing which abilities can act upon
        it:</p><ul><li><p><strong>Magical.</strong> The effect is sustained by
        magic. All spell-applied effects are Magical, and only anti-magic - a
        dispel, a cleanse, or the like - can strip a Magical effect, by
        overcoming its Removal DC. Effects that are not Magical are immune to
        anti-magic.</p></li></ul><h2>The Escape Action</h2><p>The most familiar
        Removal DC is the one checked when breaking free of restraint. A
        creature suffering the @Condition[restrained] condition may take the
        <strong>Escape</strong> action, spending 2 Action Points to make an
        <strong>Athletics</strong> check against the lowest Removal DC among the
        effects restraining it. Each restraining effect whose Removal DC the
        result exceeds is ended; if an effect grants other benefits beyond
        Restrained, only the Restrained condition is stripped from it.</p>
    video:
      controls: true
      volume: 0.5
    src: null
    ownership:
      default: -1
      QvBFYpRRXHRBcOfP: 3
    flags: {}
    _stats:
