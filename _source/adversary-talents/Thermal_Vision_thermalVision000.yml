name: Thermal Vision
type: talent
img: icons/magic/perception/eye-slit-orange.webp
system:
  nodes: []
  description: >-
    <p>The @ref[actor.name]{Creature} perceives the world through differences in
    temperature with precision, allowing it to locate creatures whose bodily
    temperature deviates from ambient norms.</p><p>This allows detection of
    creatures whose body temperatures are <strong>Gelid</strong>,
    <strong>Cool</strong>, <strong>Warm</strong>, or <strong>Boiling</strong> up
    to 60 feet away as long as they are not behind total cover and as long as
    the @ref[actor.name]{creature} is not @Condition[blinded] or
    @Condition[incapacitated]. A creature detected in this way is treated as
    visible for the purposes of Actions which require sight.</p>
