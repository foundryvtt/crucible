name: Glider
type: talent
img: icons/creatures/birds/raptor-hawk-flying.webp
system:
  nodes: []
  description: >-
    <p>The @ref[actor.name]{creature} controls its descent while falling. Unless
    it is Incapacitated or Restrained, a fall becomes a <strong>Glide</strong>:
    a downward Fly movement instead of an impact, suffering no falling
    damage.</p> <p>While gliding the creature's <strong>Stride</strong> is
    doubled and it is granted a free move, so it can always glide at least a
    short distance. Its glide must descend, and wherever the movement ends is
    where it comes to rest; if it ends the glide still aloft it gains the
    @Condition[flying] condition.</p>
